<!doctype html>
<html lang="zh-CN">
<head>

  <title>AutoAnime</title>
  <style>
    body{margin:0;background:#111827;color:#e5e7eb;font-family:Segoe UI,Arial,sans-serif;display:grid;place-items:center;min-height:100vh}
    main{background:#182235;border:1px solid #334155;border-radius:8px;padding:28px;width:min(560px,90vw)}

  <main>
    <h1>AutoAnime</h1>

  </main>
