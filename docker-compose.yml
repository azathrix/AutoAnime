services:
  autoanime:
    build: .
    image: autoanime:local
    container_name: autoanime
    restart: unless-stopped
    ports:
      - "32888:8080"
    environment:
      APP_DATA_DIR: /data
      TZ: Asia/Shanghai
    volumes:
      - ./data:/data
      # Optional: mount your rclone PikPak media path for direct NFO output.
      # - /volume1/Assets3/Media/pikpak-anime:/media/anime
